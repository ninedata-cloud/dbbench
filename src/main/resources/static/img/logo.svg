<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- Database cylinder body -->
  <path d="M2,14 L2,50 Q2,60 32,60 Q62,60 62,50 L62,14" fill="#0a1628" stroke="url(#dbGrad)" stroke-width="2.5"/>

  <!-- Database top ellipse -->
  <ellipse cx="32" cy="14" rx="30" ry="10" fill="#0a1628"/>
  <ellipse cx="32" cy="14" rx="30" ry="10" fill="url(#dbGrad)" opacity="0.25"/>
  <ellipse cx="32" cy="14" rx="30" ry="10" fill="none" stroke="url(#dbGrad)" stroke-width="2.5"/>

  <!-- Database middle rings -->
  <ellipse cx="32" cy="28" rx="30" ry="9" fill="none" stroke="#00d9ff" stroke-width="1.4" opacity="0.35"/>
  <ellipse cx="32" cy="42" rx="30" ry="9" fill="none" stroke="#00d9ff" stroke-width="1.4" opacity="0.25"/>

  <!-- Lightning bolt -->
  <polygon points="38,4 24,32 33,32 26,62 46,26 36,26" fill="url(#boltGrad)" opacity="0.95"/>
  <polygon points="38,4 24,32 33,32 26,62 46,26 36,26" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.35"/>

  <!-- Data flow dots -->
  <circle cx="12" cy="24" r="2.2" fill="#00ff88" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="35" r="2.2" fill="#00ff88" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="46" r="2.2" fill="#00ff88" opacity="0.3">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
</svg>
