name: TiDB
type: tidb
driver: com.mysql.cj.jdbc.Driver
url: "jdbc:mysql://{host}:{port}/{database}"
urlParams:
  allowLoadLocalInfile: "true"
  rewriteBatchedStatements: "true"
init:
  - "SET GLOBAL local_infile = ON"
csvLoad: "LOAD DATA LOCAL INFILE '${filePath}' INTO TABLE ${tableName} FIELDS TERMINATED BY ',' OPTIONALLY ENCLOSED BY '\"' LINES TERMINATED BY '\\n' (${columns})"
metrics:
  - active_connections: "SELECT COUNT(*) FROM INFORMATION_SCHEMA.PROCESSLIST WHERE COMMAND != 'Sleep'"
  - sql: "SELECT TYPE, COUNT(*) as cnt FROM INFORMATION_SCHEMA.CLUSTER_INFO GROUP BY TYPE"
    map: {}
  - sql: >
      SELECT COUNT(*) as tikv_store_count,
      SUM(AVAILABLE) as tikv_available_bytes,
      SUM(CAPACITY) as tikv_capacity_bytes,
      SUM(LEADER_COUNT) as tikv_leader_count,
      SUM(REGION_COUNT) as tikv_region_count
      FROM INFORMATION_SCHEMA.TIKV_STORE_STATUS
  - buffer_pool_hit_ratio: "((tikv_capacity_bytes - tikv_available_bytes) / tikv_capacity_bytes) * 100"
    computed: true
hostMetrics:
  - sql: >
      SELECT COUNT(*) as tikv_region_count,
      SUM(APPROXIMATE_SIZE) as tikv_total_size_mb,
      SUM(APPROXIMATE_KEYS) as tikv_total_keys
      FROM INFORMATION_SCHEMA.TIKV_REGION_STATUS
