name: Dameng
type: dameng
aliases:
  - dm
driver: dm.jdbc.driver.DmDriver
url: "jdbc:dm://{host}:{port}/{database}"
validation: "SELECT 1 FROM DUAL"
noLimit: true
dropStatement: "DROP TABLE ${tableName} CASCADE CONSTRAINTS"
init:
  - "ALTER SESSION SET NLS_DATE_FORMAT = 'YYYY-MM-DD HH24:MI:SS'"
metrics:
  - buffer_pool_hit_ratio: "SELECT ROUND(SUM(N_LOGIC_READS-RAT_HIT/100*N_LOGIC_READS)/sum(N_LOGIC_READS)* 100, 2) as hit FROM V$BUFFERPOOL"
  - active_connections: "SELECT COUNT(*) FROM V$SESSIONS WHERE STATE = 'ACTIVE'"
  - lock_waits: "SELECT COUNT(*) FROM V$LOCK WHERE BLOCKED = 1"
hostMetrics:
  - sql: >
      SELECT 100-cpu_idle_rate "cpuUsage",send_bytes_total "networkSentBytes",receive_bytes_total "networkRecvBytes",n_cpu "cpuCores" FROM V$SYSTEMINFO a
  - sql: >
      SELECT a.PARA_VALUE*b.stat_val "diskReadBytes",a.PARA_VALUE*c.stat_val+d.stat_val AS "diskWriteBytes" FROM
      (SELECT max(PARA_VALUE) PARA_VALUE FROM V$DM_INI WHERE PARA_NAME = 'GLOBAL_PAGE_SIZE') a,
      (SELECT stat_val FROM V$SYSSTAT WHERE name = 'physical read count') b,
      (SELECT stat_val FROM V$SYSSTAT WHERE name ='physical write count') c,
      (SELECT stat_val FROM V$SYSSTAT WHERE name ='log write bytes') d

