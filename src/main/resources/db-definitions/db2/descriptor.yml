name: DB2
type: db2
driver: com.ibm.db2.jcc.DB2Driver
url: "jdbc:db2://{host}:{port}/{database}"
validation: "SELECT 1 FROM SYSIBM.SYSDUMMY1"
noLimit: true
dropStatement: "DROP TABLE ${tableName}"
csvLoad:
  batch: 5000
metrics:
  - active_connections: "SELECT COUNT(*) FROM SYSIBMADM.APPLICATIONS WHERE APPL_STATUS = 'UOWEXEC'"
  - total_connections: "SELECT COUNT(*) FROM SYSIBMADM.APPLICATIONS"
  - buffer_pool_hit_ratio: SELECT (sum(POOL_DATA_L_READS + POOL_INDEX_L_READS)-sum(POOL_DATA_P_READS + POOL_INDEX_P_READS))*100.0/sum(POOL_DATA_L_READS + POOL_INDEX_L_READS) AS "buffer_pool_hit_ratio"
      FROM TABLE(MON_GET_BUFFERPOOL(NULL, -2)) AS T
hostMetrics:
  - cpuUsage: "SELECT value FROM SYSIBMADM.ENV_SYS_RESOURCES WHERE name='CPU_USAGE_TOTAL'"
  - sql: >
      SELECT SUM(POOL_DATA_P_READS + POOL_INDEX_P_READS + POOL_XDA_P_READS) * 8192 as "diskReadBytes",
      SUM(POOL_DATA_WRITES + POOL_INDEX_WRITES + POOL_XDA_WRITES) * 8192 as "diskWriteBytes"
      FROM TABLE(MON_GET_TABLESPACE(NULL, -2)) AS T
  - sql: >
      SELECT TCPIP_RECV_VOLUME as "networkRecvBytes", TCPIP_SEND_VOLUME as "networkSentBytes"
      FROM TABLE(MON_GET_DATABASE(-2)) AS T
