name: YashanDB
type: yashandb
aliases:
  - yashan
driver: com.yashandb.jdbc.Driver
url: "jdbc:yasdb://{host}:{port}/{database}"
validation: "SELECT 1 FROM DUAL"
noLimit: true
dropStatement: "DROP TABLE ${tableName} CASCADE CONSTRAINTS"
init:
  - "ALTER SESSION SET DATE_FORMAT = 'YYYY-MM-DD HH24:MI:SS'"
metrics:
  - active_connections: "SELECT COUNT(*) FROM V$SESSION WHERE STATUS = 'ACTIVE'"
  - buffer_pool_hit_ratio: >
      SELECT ROUND((1 - (disk_reads.value / NULLIF(buffer_gets.value + buffer_cr_gets.value, 0))) * 100, 2) AS buffer_cache_hit_ratio
      FROM 
          (SELECT value FROM V$SYSSTAT WHERE name = 'DISK READS') disk_reads,
          (SELECT value FROM V$SYSSTAT WHERE name = 'BUFFER GETS') buffer_gets,
          (SELECT value FROM V$SYSSTAT WHERE name = 'BUFFER CR GETS') buffer_cr_gets
  - lock_waits: "SELECT COUNT(*) FROM V$LOCK WHERE REQUEST IS NOT NULL"
hostMetrics:
  - sql: "SELECT STAT_NAME, VALUE FROM V$OSSTAT WHERE STAT_NAME IN ('NUM_CPUS', 'PHYSICAL_MEMORY_BYTES', 'FREE_MEMORY_BYTES')"
    map:
      NUM_CPUS: cpuCores
      PHYSICAL_MEMORY_BYTES: memoryTotalBytes
      FREE_MEMORY_BYTES: memoryFreeBytes
