name: GBase 8s
type: gbase8s
aliases:
  - gbase
driver: com.gbasedbt.jdbc.Driver
url: "jdbc:gbasedbt-sqli://{host}:{port}/{database}"
validation: "SELECT 1 FROM systables WHERE tabid = 1"
noLimit: true
dropStatement: "DROP TABLE ${tableName}"
metrics:
  - active_connections: "SELECT COUNT(*) FROM sysmaster.syssessions WHERE connected > 0"
  - total_connections: "SELECT COUNT(*) FROM sysmaster.syssessions"
  - sql: >
      SELECT name, value FROM sysmaster.sysprofile
      WHERE name IN ('bufreads', 'pagreads')
    map:
      bufreads: bufreads
      pagreads: pagreads
  - lock_waits: "SELECT COUNT(*) FROM sysmaster.syslocks WHERE waiter > 0"
  - buffer_pool_hit_ratio: "((bufreads - pagreads) / bufreads) * 100"
    computed: true
hostMetrics:
  - sql: >
      SELECT SUM(pagesread) * 4096 as diskReadBytes, SUM(pageswritten) * 4096 as diskWriteBytes
      FROM sysmaster.syschkio
